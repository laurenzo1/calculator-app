<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    /* Mon code CSS, */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f0f0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .calculator {
      background-color: #020808fd;
      border-radius: 5px 5px 15px 15px;
      padding: 20px 20px 18px 18px;
      width: 330px;
      height: 525px;
      position: relative;
    }

    .brand {
      display: flex;
      justify-content: space-around;
      align-items: baseline;
      padding: 8px 5px 12px 5px;
      font-style: italic;
      font-size: 15px;
      letter-spacing: 2px;
      color: #bb7519;
      user-select: none;
      position: relative;
    }

    .brand .title {
      font-size: 25px;
      letter-spacing: 1px;
      font-weight: bold;
      font-style: italic;
    }

    .brand .model {
      font-size: 15px;
    }

    .text {
      padding: auto;
      text-align: center;
      color: rgb(214, 22, 54);
      text-transform: uppercase;
      font-size: smaller;
      user-select: none;
      margin-bottom: 15px;
      font-weight: bold;
    }

    #screen {
      width: 100%;
      height: 60px;
      text-align: right;
      font-size: 25px;
      border-radius: 2px;
      font-family: "Courier New", Courier, monospace;
      background-color: #cccaca;
      padding: 8px 15px;
      margin-bottom: 20px;
      cursor: none;
      letter-spacing: 2px;
      color: black;
    }

    [class^="row"] {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      height: 55px;
      border-radius: 10px;
      cursor: pointer;
      background-color: rgb(179, 172, 172);
      color: white;
      font-size: 20px;
    }

    .del {
      background-color: rgb(207, 25, 25);
      border: none;
    }

    .equal {
      background-color: green;
      border: none;
      grid-column: span 2;
    }

    .del:active {
      border-color: black;
      border-style: groove;
      transform: scale(0.95);
    }

    .equal:active {
      transform: scale(0.93);
    }
  </style>
</head>

<body>
  <div class="calculator">
    <div class="brand">
      <p class="title">JOINUS</p>
      <p class="model">JS-82MS-5</p>
    </div>
    <div class="text">
      <p>Scientific Calculator</p>
    </div>
    <input type="text" disabled id="screen" placeholder="0"/>
    <div class="row1">
      <input type="button" value="AC" data-action="clear" class="del" />
      <input type="button" value="DEL" data-action="delete" class="del" />
      <input type="button" value="%" data-value="%" />
      <input type="button" value="/" data-value="/" />
    </div>
    <div class="row2">
      <input type="button" value="7" data-value="7" />
      <input type="button" value="8" data-value="8" />
      <input type="button" value="9" data-value="9" />
      <input type="button" value="x" data-value="*" />
    </div>
    <div class="row3">
      <input type="button" value="4" data-value="4" />
      <input type="button" value="5" data-value="5" />
      <input type="button" value="6" data-value="6" />
      <input type="button" value="+" data-value="+" />
    </div>
    <div class="row4">
      <input type="button" value="1" data-value="1" />
      <input type="button" value="2" data-value="2" />
      <input type="button" value="3" data-value="3" />
      <input type="button" value="-" data-value="-" />
    </div>
    <div class="row5">
      <input type="button" value="0" data-value="0" />
      <input type="button" value="." data-value="." />
      <input type="button" value="=" data-action="calculate" class="equal" />
    </div>
  </div>
  <script>
    // Mon code Js
    const screen = document.getElementById("screen");

    let nombre1 = "";
    let operateur = "";
    let nombre2 = "";
    let affichage = "0";

    function afficher() {
      screen.value = affichage;
    }

    function ajouterChiffre(chiffre) {
      if (affichage === "0") {
        affichage = chiffre;
      } else {
        affichage = affichage + chiffre;
      }
      afficher();
    }

    function ajouterPoint() {
      if (affichage.includes(".")) {
        return;
      }

      affichage = affichage + ".";
      afficher();
    }

    function choisirOperateur(op) {
      if (operateur !== "" && nombre2 !== "") {
        calculer();
      }

      nombre1 = affichage;
      operateur = op;
      affichage = "0";
      afficher();
    }

    function calculer() {
      if (operateur === "" || nombre1 === "") {
        return;
      }

      nombre2 = affichage;

      const a = parseFloat(nombre1);
      const b = parseFloat(nombre2);

      let resultat = 0;

      if (operateur === "+") {
        resultat = a + b;
      } else if (operateur === "-") {
        resultat = a - b;
      } else if (operateur === "*") {
        resultat = a * b;
      } else if (operateur === "/") {
        if (b === 0) {
          alert("Erreur : Division par zéro !");
          toutEffacer();
          return;
        }
        resultat = a / b;
      } else if (operateur === "%") {
        resultat = a % b;
      }

      affichage = resultat.toString();
      operateur = "";
      nombre1 = "";
      nombre2 = "";
      afficher();
    }

    function toutEffacer() {
      nombre1 = "";
      operateur = "";
      nombre2 = "";
      affichage = "0";
      afficher();
    }

    function effacerDernier() {
      if (affichage.length > 1) {
        affichage = affichage.slice(0, -1);
      } else {
        affichage = "0";
      }
      afficher();
    }

    document
      .querySelector('[data-value="0"]')
      .addEventListener("click", function () {
        ajouterChiffre("0");
      });
    document
      .querySelector('[data-value="1"]')
      .addEventListener("click", function () {
        ajouterChiffre("1");
      });
    document
      .querySelector('[data-value="2"]')
      .addEventListener("click", function () {
        ajouterChiffre("2");
      });
    document
      .querySelector('[data-value="3"]')
      .addEventListener("click", function () {
        ajouterChiffre("3");
      });
    document
      .querySelector('[data-value="4"]')
      .addEventListener("click", function () {
        ajouterChiffre("4");
      });
    document
      .querySelector('[data-value="5"]')
      .addEventListener("click", function () {
        ajouterChiffre("5");
      });
    document
      .querySelector('[data-value="6"]')
      .addEventListener("click", function () {
        ajouterChiffre("6");
      });
    document
      .querySelector('[data-value="7"]')
      .addEventListener("click", function () {
        ajouterChiffre("7");
      });
    document
      .querySelector('[data-value="8"]')
      .addEventListener("click", function () {
        ajouterChiffre("8");
      });
    document
      .querySelector('[data-value="9"]')
      .addEventListener("click", function () {
        ajouterChiffre("9");
      });

    document
      .querySelector('[data-value="."]')
      .addEventListener("click", function () {
        ajouterPoint();
      });

    document
      .querySelector('[data-value="+"]')
      .addEventListener("click", function () {
        choisirOperateur("+");
      });
    document
      .querySelector('[data-value="-"]')
      .addEventListener("click", function () {
        choisirOperateur("-");
      });
    document
      .querySelector('[data-value="*"]')
      .addEventListener("click", function () {
        choisirOperateur("*");
      });
    document
      .querySelector('[data-value="/"]')
      .addEventListener("click", function () {
        choisirOperateur("/");
      });
    document
      .querySelector('[data-value="%"]')
      .addEventListener("click", function () {
        choisirOperateur("%");
      });

    document
      .querySelector('[data-action="calculate"]')
      .addEventListener("click", function () {
        calculer();
      });

    document
      .querySelector('[data-action="clear"]')
      .addEventListener("click", function () {
        toutEffacer();
      });

    document
      .querySelector('[data-action="delete"]')
      .addEventListener("click", function () {
        effacerDernier();
      });

    afficher();
  </script>
</body>

</html>
